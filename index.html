<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chifoumi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="page">
        <h1>Pierre feuille ciseaux</h1>
        <div>
        <label>
            <input type="checkbox" id="modeDifficile">
            Mode difficile
        </label>
        </div>
        <label for="maxScore">Nombre de manches gagnantes :</label>
        <input type="number" id="maxScore" value="5">
        <div>
            <div>
                <button type="button" id="pierre"><i class="bi bi-circle-fill"></i></button>
                <button type="button" id="feuille"><i class="bi bi-leaf"></i></button>
                <button type="button" id="ciseaux"><i class="bi bi-scissors"></i></button>
            </div>
            <div>
                <p id="choisir">Choisir une option</p>
                <p id="resultat"></p>
                <p id="gagner"></p>
            </div>
        </div>
        <div>
            <p>compteur</p>
            <div class="score">
                <p>Joueur <span id="scoreJoueur">0</span></p>
                <p>|</p>
                <p><span id="scoreOrdi">0</span> Ordinateur</p>
            </div>
        </div>
         <div class="historique-container">
            <h2>📜 Historique</h2>
            <div id="historique" class="historique"></div>
        </div>
        <button type="button" id="reset">Nouvelle partie</button>
    </div>


    <script src="app.js"></script>
</body>

</html>
